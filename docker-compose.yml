version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cv_tailor
      POSTGRES_USER: cv_tailor
      POSTGRES_PASSWORD: cv_tailor
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://cv_tailor:cv_tailor@postgres:5432/cv_tailor
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: super-secret-key
      OPENAI_MODEL: gpt-4o-mini
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # внешние URL для OAuth redirect и возврата во фронт (через nginx)
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:18080}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:18080}
      # согласие / админ
      CONSENT_VERSION: ${CONSENT_VERSION:-2026-06-24}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      # капча
      SMARTCAPTCHA_SERVER_KEY: ${SMARTCAPTCHA_SERVER_KEY:-}
      # OAuth
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      VK_CLIENT_ID: ${VK_CLIENT_ID:-}
      VK_CLIENT_SECRET: ${VK_CLIENT_SECRET:-}
      # SMTP (пусто = код печатается в логи backend)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SSL: ${SMTP_SSL:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@cv-tailor.local}
    depends_on:
      - postgres
      - redis
    ports:
      - "18001:8000"

  worker:
    build:
      context: ./backend
    command: celery -A app.infrastructure.tasks.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://cv_tailor:cv_tailor@postgres:5432/cv_tailor
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: super-secret-key
      OPENAI_MODEL: gpt-4o-mini
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: /api
    depends_on:
      - backend
    ports:
      - "15174:5173"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "18080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:

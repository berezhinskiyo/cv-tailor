services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [default]

  backend:
    build:
      context: ./backend
    environment:
      # Общий PostgreSQL сервера (стек shared-postgres, сеть `shared`)
      DATABASE_URL: postgresql+psycopg://${DB_USER:-cvtailor}:${DB_PASSWORD:-cvtailor}@shared-postgres:5432/${DB_NAME:-cvtailor}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-super-secret-key}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      # Внешние URL (через общий edge) — для OAuth redirect и возврата во фронт
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:18080}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:18080}
      # согласие / админ
      CONSENT_VERSION: ${CONSENT_VERSION:-2026-06-24}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      # капча
      SMARTCAPTCHA_SERVER_KEY: ${SMARTCAPTCHA_SERVER_KEY:-}
      # OAuth
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      VK_CLIENT_ID: ${VK_CLIENT_ID:-}
      VK_CLIENT_SECRET: ${VK_CLIENT_SECRET:-}
      # Email: HTTP-API Postbox (приоритет) -> SMTP -> консоль
      EMAIL_HTTP_ENDPOINT: ${EMAIL_HTTP_ENDPOINT:-}
      EMAIL_HTTP_KEY_ID: ${EMAIL_HTTP_KEY_ID:-}
      EMAIL_HTTP_SECRET: ${EMAIL_HTTP_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SSL: ${SMTP_SSL:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@cvtailor.ru}
      # Эквайринг Т-Банк (значения — в .env окружения на сервере)
      TINKOFF_TERMINAL_KEY: ${TINKOFF_TERMINAL_KEY:-}
      TINKOFF_PASSWORD: ${TINKOFF_PASSWORD:-}
      TINKOFF_API_URL: ${TINKOFF_API_URL:-https://securepay.tinkoff.ru/v2/}
      TINKOFF_TAXATION: ${TINKOFF_TAXATION:-usn_income}
      TINKOFF_VAT: ${TINKOFF_VAT:-none}
    depends_on:
      - redis
    networks: [default, shared]
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    command: celery -A app.infrastructure.tasks.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://${DB_USER:-cvtailor}:${DB_PASSWORD:-cvtailor}@shared-postgres:5432/${DB_NAME:-cvtailor}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-super-secret-key}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
    depends_on:
      - redis
    networks: [default, shared]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
        VITE_SMARTCAPTCHA_SITEKEY: ${VITE_SMARTCAPTCHA_SITEKEY:-}
    depends_on:
      - backend
    networks: [default]
    restart: unless-stopped

  # TLS терминируется ОБЩИМ edge-Caddy сервера. nginx стека слушает только на
  # loopback-порту WEB_PORT; edge проксирует домен окружения на 127.0.0.1:${WEB_PORT}.
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "127.0.0.1:${WEB_PORT:-18080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [default]
    restart: unless-stopped

networks:
  default:
  # Общая сеть сервера с единым PostgreSQL (создаётся стеком shared-postgres)
  shared:
    external: true
    name: shared

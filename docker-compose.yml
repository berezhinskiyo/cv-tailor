services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cv_tailor
      POSTGRES_USER: cv_tailor
      POSTGRES_PASSWORD: cv_tailor
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://cv_tailor:cv_tailor@postgres:5432/cv_tailor
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: super-secret-key
      OPENAI_MODEL: gpt-4o-mini
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # внешние URL для OAuth redirect и возврата во фронт (через nginx)
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:18080}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:18080}
      # согласие / админ
      CONSENT_VERSION: ${CONSENT_VERSION:-2026-06-24}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      # капча
      SMARTCAPTCHA_SERVER_KEY: ${SMARTCAPTCHA_SERVER_KEY:-}
      # OAuth
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      VK_CLIENT_ID: ${VK_CLIENT_ID:-}
      VK_CLIENT_SECRET: ${VK_CLIENT_SECRET:-}
      # Email: HTTP-API Postbox (приоритет) -> SMTP -> консоль
      EMAIL_HTTP_ENDPOINT: ${EMAIL_HTTP_ENDPOINT:-}
      EMAIL_HTTP_KEY_ID: ${EMAIL_HTTP_KEY_ID:-}
      EMAIL_HTTP_SECRET: ${EMAIL_HTTP_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SSL: ${SMTP_SSL:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@cvtailor.ru}
    depends_on:
      - postgres
      - redis
    ports:
      - "18001:8000"

  worker:
    build:
      context: ./backend
    command: celery -A app.infrastructure.tasks.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://cv_tailor:cv_tailor@postgres:5432/cv_tailor
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: super-secret-key
      OPENAI_MODEL: gpt-4o-mini
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
        VITE_SMARTCAPTCHA_SITEKEY: ${VITE_SMARTCAPTCHA_SITEKEY:-}
    depends_on:
      - backend
    ports:
      - "15174:80"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    # Наружу больше не публикуем 80 — фронтом владеет Caddy (TLS).
    # 18080 оставлен для локальной отладки/healthcheck с самого сервера.
    ports:
      - "18080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  # Edge-прокси с автоматическим HTTPS (Let's Encrypt). Слушает 80/443,
  # сам получает и продлевает сертификат, проксирует на внутренний nginx.
  caddy:
    image: caddy:2-alpine
    depends_on:
      - nginx
    restart: unless-stopped
    # На этом сервере наследуемый резолвер 1.1.1.1 недоступен
    # (network is unreachable) → задаём DNS, до которых есть маршрут.
    dns:
      - 77.88.8.8
      - 8.8.8.8
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

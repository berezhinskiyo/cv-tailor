server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA: любые маршруты отдают index.html, роутинг разруливает React Router.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Статика с длинным кэшем (файлы с хэшем в имени).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}

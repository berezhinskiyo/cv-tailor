name: Deploy

# Каскад main → test → prod ОДНИМ запуском (push в main).
# Важно: push, сделанный GITHUB_TOKEN из Actions, НЕ триггерит новые workflow
# (защита GitHub от рекурсии). Поэтому этапы связаны через needs внутри одного run,
# а не через триггеры на push в ветки test/prod.
#   sync-test   — обновляет ветку test из main
#   deploy-test — катит TEST (cvtailor.test.vniknu.ru)
#   sync-prod   — обновляет ветку prod из test   (при DEPLOY_PROD_ENABLED=true)
#   deploy-prod — катит PROD (cvtailor.vniknu.ru) (при DEPLOY_PROD_ENABLED=true)

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  SSH_HOST: "109.73.197.92"
  REPO_URL: "https://github.com/berezhinskiyo/cv-tailor.git"

jobs:
  sync-test:
    name: main → test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update test from main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin main:test --force

  deploy-test:
    name: Deploy TEST (cvtailor.test.vniknu.ru)
    needs: sync-test
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Encode env (base64, masked)
        id: enc
        env:
          DOTENV: ${{ secrets.DOTENV }}
        run: |
          if [ -z "$DOTENV" ]; then echo "секрет DOTENV пуст в Environment 'test'"; exit 1; fi
          B64=$(printf '%s' "$DOTENV" | base64 -w0)
          echo "::add-mask::$B64"
          echo "b64=$B64" >> "$GITHUB_OUTPUT"
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          DOTENV_B64: ${{ steps.enc.outputs.b64 }}
        with:
          host: ${{ env.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DOTENV_B64
          command_timeout: 30m
          script: |
            set -euo pipefail
            APP_DIR="/opt/cvtailor-test"
            BRANCH="test"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone --branch "$BRANCH" "${{ env.REPO_URL }}" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"
            umask 077
            printf '%s' "$DOTENV_B64" | base64 -d > "$APP_DIR/.env"
            docker compose build --no-cache backend
            docker compose up --build -d
            docker compose ps

  sync-prod:
    name: test → prod
    needs: deploy-test
    if: vars.DEPLOY_PROD_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update prod from test
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin test
          git push origin origin/test:refs/heads/prod --force

  deploy-prod:
    name: Deploy PROD (cvtailor.vniknu.ru)
    needs: sync-prod
    if: vars.DEPLOY_PROD_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Encode env (base64, masked)
        id: enc
        env:
          DOTENV: ${{ secrets.DOTENV }}
        run: |
          if [ -z "$DOTENV" ]; then echo "секрет DOTENV пуст в Environment 'prod'"; exit 1; fi
          B64=$(printf '%s' "$DOTENV" | base64 -w0)
          echo "::add-mask::$B64"
          echo "b64=$B64" >> "$GITHUB_OUTPUT"
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          DOTENV_B64: ${{ steps.enc.outputs.b64 }}
        with:
          host: ${{ env.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DOTENV_B64
          command_timeout: 30m
          script: |
            set -euo pipefail
            APP_DIR="/opt/cvtailor-prod"
            BRANCH="prod"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone --branch "$BRANCH" "${{ env.REPO_URL }}" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"
            umask 077
            printf '%s' "$DOTENV_B64" | base64 -d > "$APP_DIR/.env"
            docker compose build --no-cache backend
            docker compose up --build -d
            docker compose ps

name: Deploy

on:
  push:
    branches:
      - main
      - test
      - prod

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-test:
    name: main → test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update test from main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin main:test --force

  sync-prod:
    name: test → prod
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update prod from test
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin test:prod --force

  deploy:
    name: Deploy to production
    if: github.ref == 'refs/heads/prod'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 109.73.197.92
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            REPO_URL="https://github.com/berezhinskiyo/cv-tailor.git"
            APP_DIR="/opt/cv-tailor"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone --branch prod "$REPO_URL" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin prod
            git reset --hard FETCH_HEAD
            docker compose up --build -d
            docker compose restart nginx
            docker compose ps
